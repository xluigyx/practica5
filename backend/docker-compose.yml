version: '3.8'

networks:
  evolution-net:
    driver: bridge

volumes:
  evolution-pg-data:
  evolution-instances:

services:
  redis:
    image: redis:7-alpine
    container_name: backendluz-redis
    networks: [evolution-net]
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  evolution-db:
    image: postgres:15-alpine
    container_name: backendluz-evolution-db
    networks: [evolution-net]
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution_pass
      POSTGRES_DB: evolution
    volumes:
      - evolution-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: backendluz-evolution
    networks: [evolution-net]
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: luz_evolution_key
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution_pass@evolution-db:5432/evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_LOCAL_ENABLED: "false"
      WEBHOOK_GLOBAL_ENABLED: "true"
      WEBHOOK_GLOBAL_URL: http://host.docker.internal:4000/api/whatsapp/evolution/webhook
      WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS: "false"
      WEBHOOK_EVENTS_MESSAGES_UPSERT: "true"
      WEBHOOK_EVENTS_STATUS_INSTANCE: "true"
      LOG_LEVEL: INFO
    volumes:
      - evolution-instances:/evolution/instances
    depends_on:
      redis:
        condition: service_healthy
      evolution-db:
        condition: service_healthy
    restart: unless-stopped
